# Blueprint de Render: crea la base PostgreSQL gratis y el servicio web (Docker)
# y los conecta automáticamente. En Render: New + > Blueprint > selecciona este repo.
databases:
  - name: gestion-academicaa-db
    databaseName: gestion_academica
    user: admin
    plan: free

services:
  - type: web
    name: gestion-academicaa
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: APP_NAME
        value: "Gestion Academica"
      - key: APP_ENV
        value: production
      # Déjalo en true durante el examen para ver errores; cámbialo a false si quieres ocultarlos.
      - key: APP_DEBUG
        value: "true"
      # Pega aquí la APP_KEY generada (formato base64:...). Marcada como secreto.
      - key: APP_KEY
        sync: false
      # URL pública de tu servicio en Render (la copias después del primer deploy).
      - key: APP_URL
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      # Render inyecta la cadena de conexión interna de la base de arriba.
      - key: DB_URL
        fromDatabase:
          name: gestion-academicaa-db
          property: connectionString
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      # Reinicia la BD desde cero al arrancar (BORRA datos). Úsalo UNA vez para
      # limpiar el estado corrupto de los intentos previos; luego ponlo en false.
      - key: FRESH_MIGRATE
        value: "true"
      # Cargar datos de prueba en el primer arranque. Cámbialo a false tras el primer deploy.
      - key: RUN_SEED
        value: "true"
      # Correo por SMTP (Gmail) para que SÍ se envíen los correos (recuperación, etc.).
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      # Con puerto 587, Symfony usa STARTTLS automáticamente; dejar MAIL_SCHEME vacío.
      - key: MAIL_SCHEME
        value: ""
      - key: MAIL_USERNAME
        value: fcalani38@gmail.com
      # App Password de Gmail (16 caracteres). Se pega en el dashboard de Render (secreto).
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM_ADDRESS
        value: fcalani38@gmail.com
      - key: MAIL_FROM_NAME
        value: "Sistema de Gestion Academica"
      # API de Brevo para enviar correos por HTTPS (Render bloquea el SMTP saliente).
      # Pega tu API key de Brevo en el dashboard de Render (es secreto).
      - key: BREVO_API_KEY
        sync: false
      # PayPal (sandbox). Pega tus credenciales si vas a demostrar el pago en línea.
      - key: PAYPAL_MODE
        value: sandbox
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_SECRET
        sync: false
